volumes:
  postgres_data:
  secrets:

services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_DB: yourdb
      POSTGRES_USER: youruser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  rabbitmq:
    image: "rabbitmq:3-management"
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./app/backend-api
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8000:80"
    environment:
      - DATABASE_URL=postgresql://youruser:${POSTGRES_PASSWORD:-demo_postgres_password}@postgres/yourdb
      - RABBITMQ_HOST=rabbitmq
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://localhost:5003,http://127.0.0.1:3000,http://127.0.0.1:5003,http://${LAN_HOST_IP:-192.168.1.41}:3000,http://${LAN_HOST_IP:-192.168.1.41}:5003
      # CORS_ALLOW_ORIGIN_REGEX removed — use explicit CORS_ALLOW_ORIGINS list above instead
      # Disable the baked-in /admin panel — the dedicated admin-panel container runs on :5003
      - DAA_SERVE_PANEL=false
    volumes:
      - secrets:/var/run/secrets
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "gitlab:host-gateway"

  python-agent:
    build:
      context: ./app/python-agent
      dockerfile: Dockerfile
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend-api:
        condition: service_started
    environment:
      - RABBITMQ_HOST=rabbitmq
      - DAA_BACKEND_API_URL=http://backend-api:80
      - DAA_GIT_TOKEN=${DAA_GIT_TOKEN}
      - GITLAB_PRIVATE_TOKEN=${GITLAB_PRIVATE_TOKEN}
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - DATABASE_URL=postgresql://youruser:${POSTGRES_PASSWORD:-demo_postgres_password}@postgres/yourdb
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - secrets:/var/run/secrets
      - /tmp/daa:/tmp/daa
      # NOTE: Do NOT mount host credential files here.
      # Pass secrets via environment variables only (GEMINI_API_KEY, DAA_GIT_TOKEN, etc.)
      # If you need git access, set DAA_GIT_MODE=api and configure GITHUB_TOKEN/GITLAB_PRIVATE_TOKEN.
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "gitlab:host-gateway"

  admin-panel:
    build:
      context: ./app/admin-panel
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://${LAN_HOST_IP:-192.168.1.41}:8000
    restart: always
    ports:
      - "5003:5002"
    env_file:
      - ./app/admin-panel/.env
    environment:
      - REACT_APP_API_URL=http://${LAN_HOST_IP:-192.168.1.41}:8000
    depends_on:
      - backend-api

  mcp-server:
    image: python:3.11-slim
    restart: always
    stdin_open: true
    tty: true
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "pip install -q requests psycopg2-binary && python -u app/daa_mcp_server.py"
    environment:
      - DATABASE_URL=postgresql://youruser:${POSTGRES_PASSWORD:-demo_postgres_password}@postgres/yourdb
      - DAA_BACKEND_API_URL=http://backend-api:80
      - DAA_TOKEN=${DAA_TOKEN}
    depends_on:
      - backend-api
      - postgres
