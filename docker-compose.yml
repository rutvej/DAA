volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  postgres_data:
  secrets:

services:
  gitlab:
    image: 'gitlab/gitlab-ce:latest'
    restart: always
    hostname: 'gitlab.example.com'
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://gitlab.example.com'
        gitlab_rails['initial_root_password'] = "${GITLAB_ROOT_PASSWORD}"
    ports:
      - '8082:80'
      - '8443:443'
      - '2224:22'
    volumes:
      - 'gitlab_config:/etc/gitlab'
      - 'gitlab_logs:/var/log/gitlab'
      - 'gitlab_data:/var/opt/gitlab'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/-/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_DB: yourdb
      POSTGRES_USER: youruser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_postgres_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  rabbitmq:
    image: "rabbitmq:3-management"
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./app/backend-api
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8000:80"
    environment:
      - DATABASE_URL=postgresql://youruser:${POSTGRES_PASSWORD:-demo_postgres_password}@postgres/yourdb
      - RABBITMQ_HOST=rabbitmq
      - CORS_ALLOW_ORIGINS=http://localhost:3000,http://localhost:5003,http://127.0.0.1:3000,http://127.0.0.1:5003,http://${LAN_HOST_IP:-192.168.1.41}:3000,http://${LAN_HOST_IP:-192.168.1.41}:5003
      - CORS_ALLOW_ORIGIN_REGEX=^https?://(localhost|127\.0\.0\.1|192\.168\.\d{1,3}\.\d{1,3})(:\d+)?$
    volumes:
      - secrets:/var/run/secrets

  python-agent:
    build:
      context: ./app/python-agent
      dockerfile: Dockerfile
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend-api:
        condition: service_started
    environment:
      - RABBITMQ_HOST=rabbitmq
      - DAA_BACKEND_API_URL=http://backend-api:80
      - GITLAB_PRIVATE_TOKEN=${GITLAB_PRIVATE_TOKEN}
      - GIT_REPO_URL=${GIT_REPO_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://youruser:${POSTGRES_PASSWORD:-demo_postgres_password}@postgres/yourdb
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - secrets:/var/run/secrets
      - /home/rutvej/snap/codex/34/auth.json:/app/auth.json:ro
      - /home/rutvej/Desktop/DAA/.git:/app/.git:ro

  test-app:
    build:
      context: .
      dockerfile: app/test-app/Dockerfile
    restart: on-failure
    ports:
      - "8081:8081"
    volumes:
      - ./app/daa-sdk:/app/daa-sdk
      - secrets:/var/run/secrets
    environment:
      - DAA_BACKEND_API_URL=http://backend-api:80
      - DAA_TOKEN=${DAA_TOKEN}
      - REPO_NAME=test-app
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      backend-api:
        condition: service_started

  admin-panel:
    build:
      context: ./app/admin-panel
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://${LAN_HOST_IP:-192.168.1.41}:8000
    restart: always
    ports:
      - "5003:5002"
    env_file:
      - ./app/admin-panel/.env
    environment:
      - REACT_APP_API_URL=http://${LAN_HOST_IP:-192.168.1.41}:8000
    depends_on:
      - backend-api

  checkout-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./examples/checkout-service:/app
    command: >
      bash -c "pip install -q -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    environment:
      - DAA_LOGS_URL=http://backend-api:80/logs/
      - PAYMENT_SERVICE_URL=http://payment-service:8002/pay
      - REDIS_HOST=redis-cache
      - REDIS_PORT=6379
      - DAA_TOKEN=${DAA_TOKEN}
    env_file:
      - .env
    depends_on:
      - backend-api
      - payment-service
      - redis-cache

  payment-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./examples/payment-service:/app
    command: >
      bash -c "pip install -q fastapi uvicorn pydantic && uvicorn app:app --host 0.0.0.0 --port 8002"
    ports:
      - "8002:8002"

  redis-cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
