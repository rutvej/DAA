name: CI

on:
  push:
  pull_request:

jobs:
  backend-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/backend-api/requirements.txt ruff
      - name: Lint
        run: |
          ruff check app/backend-api
      - name: Tests
        env:
          DATABASE_URL: sqlite:///./test.db
          RABBITMQ_HOST: localhost
          PYTHONPATH: app/backend-api
        run: |
          pytest app/backend-api/tests/

  python-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/python-agent/requirements.txt ruff
      - name: Lint
        run: |
          ruff check app/python-agent
      - name: Tests
        env:
          PYTHONPATH: app/python-agent
        run: |
          python -m unittest discover app/python-agent/tests

  admin-panel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: app/admin-panel
        run: |
          npm ci
      - name: Tests
        working-directory: app/admin-panel
        run: |
          npm test -- --watchAll=false --passWithNoTests

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [backend-api, python-agent, admin-panel]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

